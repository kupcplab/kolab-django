{% extends 'base.html' %}

{% block content %}

<div class="container py-4 py-md-5">

    <br class="mobile-delete">
    
    <!-- page title -->
    <div class="text-center mb-4 mb-md-5">
        <h2 class="fw-bold display-6 display-md-4">
            Publications
        </h2>
    </div>

    {% if publication %}
    <div class="container pt-4 pb-4 notice-detail-wrapper">

        <!-- publications list -->
        <div class="notice-content text-md-start">
            {{ publication.publication|safe }}
        </div>

    </div>
    {% endif %}

</div>

{% endblock %}
