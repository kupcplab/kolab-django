server {
    listen 80;
    server_name 43.201.199.176, kolab.re.kr;
    charset utf-8;
    client_max_body_size 128M;

    location / {
        uwsgi_pass  unix:///tmp/kolab.sock;
        include     uwsgi_params;
    }

    location /static/ {
        alias /srv/kolab-django/static/;
    }

    location /media/ {
        alias /srv/kolab-django/media/;
    }

}