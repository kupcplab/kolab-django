[uwsgi]
chdir = /srv/kolab-django/
module = kolab.wsgi:application
home = /srv/kolab-django/myvenv

uid = ubuntu
gid = ubuntu

socket = /tmp/kolab.sock
chmod-socket = 666
chown-socket = ubuntu:ubuntu

enable-threads = true
master = true
vacuum = true
pidfile = /tmp/kolab.pid
logto = /var/log/uwsgi/kolab/@(exec://date +%%Y-%%m-%%d).log
log-reopen = true